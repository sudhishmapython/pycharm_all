<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

<h2>Verify Certificate</h2>

<form method="post">
    {% csrf_token %}
    <input type="text" name="certificate_id" placeholder="Enter Certificate ID">
    <button type="submit">Verify</button>
</form>

<!-- ERROR -->
{% if error %}
<p style="color:red;">{{ error }}</p>
{% endif %}

<!-- PDF DISPLAY -->
{% if cert %}
    <h3>Certificate Preview:</h3>
    <iframe src="{{ cert.pdf_file.url }}" width="100%" height="600px"></iframe>
{% endif %}
</body>
</html>
