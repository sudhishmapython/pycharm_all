<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate Verification</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }


        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }
        .card {
            border-radius: 12px;
        }
        .btn-custom {
            background-color: #0d6efd;
            color: white;
        }
        .btn-custom:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">

    <span class="navbar-brand">Certificate System</span>

    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm me-2">
            Dashboard
        </a>

        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
            Logout
        </a>
    </div>

</nav>
<div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 400px;">

        <h3 class="text-center mb-3">🔍 Verify Certificate</h3>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Certificate ID</label>
                <input type="text" name="certificate_id" class="form-control" placeholder="Enter ID" required>
            </div>

            <button type="submit" class="btn btn-custom w-100">Verify</button>
        </form>

        <!-- ERROR -->
        {% if error %}
        <div class="alert alert-danger mt-3 text-center">
            {{ error }}
        </div>
        {% endif %}

        <!-- SUCCESS -->
        {% if pdf_url %}
        <div class="alert alert-success mt-3 text-center">
            ✅ Certificate Verified
        </div>

        <div class="text-center">
            <a href="{{ pdf_url }}" target="_blank" class="btn btn-primary">
                Open Certificate
            </a>
        </div>

        <script>
            window.open("{{ pdf_url }}", "_blank");
        </script>
        {% endif %}

    </div>
</div>

</body>
</html>
