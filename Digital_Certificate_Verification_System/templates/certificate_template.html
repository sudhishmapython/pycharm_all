<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            text-align: center;
            font-family: Arial;
            border: 10px solid black;
            padding: 50px;
        }
    </style>
</head>
<body>

    <h1>Certificate of Completion</h1>

    <p>This is to certify that</p>

    <p>Certificate ID: {{ certificate_id }}</p>

</body>
</html>
