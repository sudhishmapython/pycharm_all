<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Certificate Preview</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border-radius: 12px;
        }

        .btn-custom {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

{% load custom_filters %}

<!-- 🔵 NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">
    <span class="navbar-brand">Certificate System</span>

    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm me-2">Dashboard</a>
        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a>
    </div>
</nav>

<!-- 🔷 CONTENT -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow p-4 text-center" style="width: 500px;">

        <h4 class="mb-4">📄 Certificate Preview</h4>

        <!-- Preview Button -->
        <a href="/preview-pdf/" target="_blank" class="btn btn-custom w-100 mb-3">
            👁 View Certificate Preview
        </a>

        <!-- Action Buttons -->
        <div class="d-flex gap-2">
            <a href="{% url 'generate' %}" class="btn btn-secondary w-50">
                ✏ Edit
            </a>

            <form method="post" action="{% url 'confirm_certificate' %}" class="w-50">
                {% csrf_token %}
                <button type="submit" class="btn btn-success w-100">
                    ✅ Confirm
                </button>
            </form>
        </div>

    </div>
</div>

</body>
</html>
