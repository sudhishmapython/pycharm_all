<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% if cert %}
<h3>Valid Certificate</h3>
<p>{{ cert.student_name }}</p>
<p>{{ cert.course }}</p>
<p>{{ cert.certificate_id }}</p>
<a href="{{ cert.pdf_file.url }}">Download PDF</a>
{% else %}
<h3>{{ error }}</h3>
{% endif %}

</body>
</html>
