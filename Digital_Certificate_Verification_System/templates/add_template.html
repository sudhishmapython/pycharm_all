<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Template</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border-radius: 12px;
        }

        .btn-custom {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom:hover {
            background-color: #0b5ed7;
        }
    </style>
</head>

<body>

<!-- 🔵 NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">

    <span class="navbar-brand">Certificate System</span>

    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm me-2">
            Dashboard
        </a>

        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
            Logout
        </a>
    </div>

</nav>

<!-- 🔷 CONTENT -->
<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow p-4" style="width: 500px;">

        <h3 class="text-center mb-4">📁 Upload Template</h3>

        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn btn-custom w-100 mt-2">
                Upload Template
            </button>
        </form>

    </div>
</div>

</body>
</html>
