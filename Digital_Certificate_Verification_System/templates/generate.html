<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Generate Certificate</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card {
            border-radius: 10px;
        }

        .btn-custom {
            background-color: #0d6efd;
            color: white;
        }

        .btn-custom:hover {
            background-color: #0b5ed7;
        }

        label {
            font-weight: 500;
            margin-bottom: 0; /* remove bottom margin to reduce vertical space */
        }

        .form-control {
            margin-bottom: 0; /* remove extra margin from input */
        }

        .row.align-items-center {
            margin-bottom: 6px; /* tight vertical spacing between rows */
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar px-4 d-flex justify-content-between">

    <span class="navbar-brand">Certificate System</span>

    <div>
        <a href="{% url 'dashboard' %}" class="btn btn-light btn-sm me-2">
            Dashboard
        </a>

        <a href="{% url 'logout' %}" class="btn btn-light btn-sm">
            Logout
        </a>
    </div>

</nav>

<!-- CENTER CONTENT -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 90vh;">
    <div class="card shadow p-3" style="width: 550px;">

        <h5 class="text-center mb-4 mt-4">🎓 Generate Certificate</h5>

        <form method="post">
            {% csrf_token %}

            <!-- Student Name -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">Student Name</label>
                <div class="col-sm-8">
                    {{ form.student_name }}
                </div>
            </div>

            <!-- Course -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">Course</label>
                <div class="col-sm-8">
                    {{ form.course }}
                </div>
            </div>

            <!-- From Date -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">From Date</label>
                <div class="col-sm-8">
                    {{ form.from_date }}
                </div>
            </div>

            <!-- To Date -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">To Date</label>
                <div class="col-sm-8">
                    {{ form.to_date }}
                </div>
            </div>

            <!-- Performance -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">Performance</label>
                <div class="col-sm-8">
                    {{ form.performance }}
                </div>
            </div>

            <!-- Issue Date -->
            <div class="row align-items-center">
                <label class="col-sm-4 col-form-label">Issue Date</label>
                <div class="col-sm-8">
                    {{ form.issue_date }}
                </div>
            </div>

            <button type="submit" class="btn btn-custom w-100 mt-2">
                Generate Certificate
            </button>

        </form>

    </div>
</div>

</body>
</html>
