<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #0d6efd;
        }

        .navbar-brand {
            color: white !important;
            font-weight: bold;
        }

        .card-box {
            border-radius: 12px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card-box:hover {
            transform: translateY(-5px);
        }

        .card a {
            text-decoration: none;
            color: black;
        }
    </style>
</head>

<body>

<!-- 🔵 NAVBAR -->
<nav class="navbar px-4">
    <span class="navbar-brand">Certificate System</span>

    <a href="{% url 'logout' %}" class="btn btn-light btn-sm">Logout</a>
</nav>

<!-- 🔷 DASHBOARD CONTENT -->
<div class="container mt-5">

    <h3 class="mb-4">📊 Dashboard</h3>

    <div class="row g-4">

        <!-- Add Template -->
        <div class="col-md-4">
            <div class="card card-box shadow p-4 text-center">
                <a href="{% url 'add_template' %}">
                    <h5>📁 Add Template</h5>
                    <p class="text-muted">Upload new certificate template</p>
                </a>
            </div>
        </div>

        <!-- Generate Certificate -->
        <div class="col-md-4">
            <div class="card card-box shadow p-4 text-center">
                <a href="{% url 'generate' %}">
                    <h5>🎓 Generate Certificate</h5>
                    <p class="text-muted">Create new certificates</p>
                </a>
            </div>
        </div>

        <!-- Verify Certificate -->
        <div class="col-md-4">
            <div class="card card-box shadow p-4 text-center">
                <a href="{% url 'verify' %}">
                    <h5>🔍 Verify Certificate</h5>
                    <p class="text-muted">Check certificate authenticity</p>
                </a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
