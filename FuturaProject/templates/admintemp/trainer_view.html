{% extends 'admintemp/base.html' %}
{% load crispy_forms_tags %}
{% block content %}


<div class="col-lg-10">
  <div class="card  " >
<!--<form method="get" class="form-inline justify-content-end">-->
<!--            <div class="form-group ">-->
<!--                {{ userFilter.form }}-->
<!--            </div>-->
<!--            <button class="btn btn-primary ml-2" type="submit">Search</button>-->
<!--        </form>-->
  <div class="card-body">
    <h5 class="card-title text-center">Trainer Details</h5>
    {% if not details %}

    <h1 class="text-center">No contents </h1>
{% else %}
    <table class="table">
  <thead>
    <tr>
      <th scope="col">Name</th>
        <th scope="col">Phone</th>
      <th scope="col">Technology</th>
    </tr>
  </thead>
  <tbody>
  {% for i in details %}
    <tr>

      <td>{{i.name}}</td>
      <td>{{i.phone_no}}</td>
      <td>{{i.technology}}</td>


      <td>
        <a href="{% url 'trainer_update' i.id %}"><button type="button" class="btn btn-outline-dark">Edit</button></a>
        <a href="{% url 'trainer_delete' i.id %}"><button type="button" class="btn btn-outline-dark">Delete</button></a>
      </td>
    </tr>
{% endfor %}
  </tbody>
</table>
{% endif %}
  </div>
</div>
</div>
{% endblock %}
