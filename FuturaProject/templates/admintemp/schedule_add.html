{% extends 'admintemp/base.html' %}
{% load crispy_forms_tags %}

{% block content %}


    <div class="card w-75">
        <div class="card-body">
            <h2 style="color:black; text-align:center; font-family: Times New Roman;">Add Schedule</h2><br>
            <form method="POST">
                {% csrf_token %}
                <div class="row">
                                <div class="form-outline mb-4 col-md-6">
                                    {{form.date|as_crispy_field}}
                                </div>
                                <div class="form-outline mb-4 col-md-6">
                                     {{form.technology|as_crispy_field}}
                                </div>
                                <div class="form-outline mb-4 col-md-6">
                                    {{form.trainers|as_crispy_field}}
                                </div>
                                <div class="form-outline mb-4 col-md-6">
                                    {{form.students|as_crispy_field}}
                                </div>
                                <div class="form-outline mb-4 col-md-6">
                                    {{form.slot|as_crispy_field}}
                                </div>
                </div>
                <button class="btn btn-outline-dark" type="submit" style="margin-left:300px;">Submit</button>
            </form>
        </div>
    </div>


<style>
    select {
        width: 350px;
        height:45px;
    }
    label{
    width: 200px;
    }

</style>


<script>
    document.getElementById('id_technology').addEventListener('change', function() {
        var technologyId = this.value;
        var studentsSelect = document.getElementById('id_students');
        var trainersSelect = document.getElementById('id_trainers');

        fetch('/get_filtered_students/?technology_id=' + technologyId)
            .then(response => response.json())
            .then(data => {
                // Clear the existing options
                studentsSelect.innerHTML = '';

                // Add options for the filtered students
                data.students.forEach(student => {
                    var option = document.createElement('option');
                    option.value = student.id;
                    option.text = student.name;
                    studentsSelect.appendChild(option);
                });
            });

        fetch('/get_filtered_trainers/?technology_id=' + technologyId)
            .then(response => response.json())
            .then(data => {
                // Clear the existing options
                trainersSelect.innerHTML = '';

                // Add options for the filtered trainers
                data.trainers.forEach(trainer => {
                    var option1 = document.createElement('option');
                    option1.value = trainer.id;
                    option1.text = trainer.name;
                    trainersSelect.appendChild(option1);
                });
            })
            .catch(error => console.error('Error:', error));
    });
</script>
{% endblock %}
