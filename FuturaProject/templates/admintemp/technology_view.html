{% extends 'admintemp/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-10">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title text-center">Technologies</h5>
            {% if not details %}
         <h1 class="text-center">No contents </h1>
    {% else %}
            <div class="table-responsive">
              <table class="table">
                <thead>
                  <tr>

                    <th scope="col">Name</th>
                    <th scope="col">Actions</th>
                  </tr>
                </thead>
                <tbody>
                  {% for i in details %}
                    <tr>

                      <td>{{i.name}}</td>

                      <td>
                         <a href="{% url 'technology_update' i.id %}" class="btn btn-outline-dark">Edit</a>
                        <form action="{% url 'technology_delete' i.id %}" method="post" style="display: inline;">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-dark">Delete</button>
        </form>
                      </td>
                    </tr>
                  {% endfor %}
                </tbody>
              </table>
            </div>
            {% endif %}
          </div>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
