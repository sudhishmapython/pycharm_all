{% extends 'usertemp/base.html' %}
{% load crispy_forms_tags %}
{% block content %}
<div>
  <canvas id="myChart"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
  const ctx = document.getElementById('myChart').getContext('2d');
  const labels = {{ labels|safe }};
  const mcqData = {{ mcq_data|safe }};
  const machineTestData = {{ machine_test_data|safe }};
  const evaluationData = {{ evaluation_data|safe }};

  new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [
        {
          label: 'MCQ',
          data: mcqData,
          backgroundColor: 'pink',
          borderColor: 'rgba(255, 99, 132, 1)',
          borderWidth: 1
        },
        {
          label: 'Machine Test',
          data: machineTestData,
          backgroundColor: 'yellow',
          borderColor: 'rgba(54, 162, 235, 1)',
          borderWidth: 1
        },
        {
          label: 'Evaluation',
          data: evaluationData,
          backgroundColor: 'orange',
          borderColor: 'rgba(75, 192, 192, 1)',
          borderWidth: 1
        }
      ]
    },
    options: {
      scales: {
        y: {
          beginAtZero: true
        }
      }
    }
  });
</script>
{% endblock %}
